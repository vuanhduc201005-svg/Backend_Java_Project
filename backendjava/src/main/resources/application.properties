spring.application.name=backendjava
#mysql
spring.datasource.url=jdbc:mysql://localhost:3306/${DB_NAME}?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
#hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.orm.jdbc.bind=TRACE
#conection pool:
#default is 10:
spring.datasource.hikari.maximum-pool-size=20
#default is same as max pool size
spring.datasource.hikari.minimum-idle=10
#default is 30 seconds
spring.datasource.hikari.connection-timeout=30000
#default is 600000 i.e 10 minutes
spring.datasource.hikari.idle-timeout=600000
#default is 1800000 i.e 30 minutes
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=HikariConnPool
# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=1000ms
#email
spring.mail.from=${MAIL_FROM}
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.host=smtp.gmail.com
#jwt
jwt.expiryMinutes=5
jwt.expiryDay=5
jwt.accessKey=${JWT_ACCESS_KEY}
jwt.refreshKey=${JWT_REFRESH_KEY}
jwt.registerKey=${JWT_REGISTER_KEY}
jwt.forgotKey=${JWT_FORGOT_KEY}
#no content
management.endpoints.web.exposure.include=*
management.endpoint.metrics.enabled=true
system.username=${SYSTEM_USERNAME}
system.password=${SYSTEM_PASSWORD}
system.email=${SYSTEM_EMAIL}
#kafka
spring.kafka.bootstrap-servers=localhost:29092
# File Upload Configuration
file.upload.path=./uploads
file.temp.path=./temp
file.chunk.size=5242880
# Multipart
spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB
#docs
openapi.service.api-docs=backend-project
openapi.service.server=http://localhost:8080
openapi.service.title=API Service
openapi.service.version=1.0.0
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.packagesToScan=com.dducwsjvbe.backendjava.controller
