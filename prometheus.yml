global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'backendjava'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8080']  # trỏ vào app IntelliJ

  - job_name: 'backendjava-docker'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'app:8080' ]

